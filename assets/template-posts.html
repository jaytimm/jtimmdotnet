<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$title$</title>
  $for(css)$
  <link rel="stylesheet" href="$css$">
  $endfor$
  $head$
  $header-includes$
  <link rel="stylesheet" href="../assets/style.css">
  <script data-goatcounter="https://jason-timm.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <nav class="site-nav">
        <a href="../index.html">Jason Timm</a>
        <a href="../about.html">About</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      $if(title)$
      <article class="post">
        <header class="post-header">
          <h1 class="post-title">$title$</h1>
          $if(date)$
          <div class="post-date">$date$</div>
          $endif$
        </header>
        <div class="post-content">
          $body$
        </div>
      </article>
      $else$
      <div class="content">
        $body$
      </div>
      $endif$
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Jason Timm</p>
    </div>
  </footer>
</body>
</html>
